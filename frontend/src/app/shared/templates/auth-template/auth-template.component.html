<div class="min-h-screen bg-amber-100 flex flex-col items-center justify-center p-4 font-mono text-black relative overflow-hidden">
  
  <!-- Animated Background Dots -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-20 z-0">
    <!-- Right moving layer (odd rows) -->
    <svg class="absolute -top-[50%] -left-[50%] w-[200%] h-[200%] animate-slide-right">
      <defs>
        <pattern id="p-right" width="80" height="80" patternUnits="userSpaceOnUse">
          <circle cx="20" cy="20" r="3" fill="#000"></circle>
          <circle cx="60" cy="20" r="3" fill="#000"></circle>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#p-right)" />
    </svg>
    
    <!-- Left moving layer (even rows) -->
    <svg class="absolute -top-[50%] -left-[50%] w-[200%] h-[200%] animate-slide-left">
      <defs>
        <pattern id="p-left" width="80" height="80" patternUnits="userSpaceOnUse">
          <circle cx="20" cy="60" r="3" fill="#000"></circle>
          <circle cx="60" cy="60" r="3" fill="#000"></circle>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#p-left)" />
    </svg>
  </div>

  <!-- Animated Decorative Background Shapes -->
  <div class="absolute top-16 left-12 md:left-24 w-24 h-24 bg-emerald-400 border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-float-1 z-0"></div>
  <div class="absolute bottom-16 right-12 md:right-24 w-20 h-20 bg-sky-400 border-4 border-black rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-float-2 z-0"></div>
  <div class="absolute top-24 right-16 md:right-32 w-16 h-16 bg-pink-400 border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-float-3 z-0"></div>
  <div class="absolute bottom-24 left-16 md:left-32 w-32 h-12 bg-purple-400 border-4 border-black rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-float-4 z-0"></div>
  
  <!-- Main Auth Card Container -->
  <div class="w-full max-w-md z-10 relative">
    <app-card [title]="title()" [subtitle]="subtitle()" bgClass="bg-white hover:scale-[1.01] transition-transform duration-300">
      <div class="mt-4">
        <app-header 
          [title]="headerTitle()" 
          [subtitle]="headerSubtitle()" 
          [border]="true"
          level="h2"
          className="mb-6"
        ></app-header>

        <!-- Dynamic Content (Login/Register Forms) -->
        <ng-content></ng-content>
      </div>
    </app-card>
  </div>
</div>
