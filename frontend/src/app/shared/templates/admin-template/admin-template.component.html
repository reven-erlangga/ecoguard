<div class="min-h-screen bg-[#EAEAEA]">
  <!-- Sidebar -->
  <app-sidebar [isOpen]="isSidebarOpen()" (closeSidebar)="isSidebarOpen.set(false)">
    <div brand class="flex flex-col gap-1 p-2">
      <div class="flex items-center gap-2">
        <!-- Shield Icon -->
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
          </path>
        </svg>
        <span class="text-2xl font-extrabold text-white tracking-tight font-mono">ECOGUARD</span>
      </div>
      <span class="text-[10px] text-gray-500 font-mono font-bold tracking-wider">BLOCKCHAIN INTEGRATED MONITORING</span>
    </div>

    <!-- Navigation Links -->
    <nav class="space-y-2 mt-8">
      <a routerLink="/" routerLinkActive="bg-black text-white" [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center px-4 py-3 text-sm font-bold text-gray-400 rounded-lg hover:bg-[#1A1A1A] hover:text-white transition-colors font-mono">
        <!-- Dashboard Icon -->
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg>
        DASHBOARD
      </a>
      <a routerLink="/issue" routerLinkActive="bg-black text-white"
        class="flex items-center px-4 py-3 text-sm font-bold text-gray-400 rounded-lg hover:bg-[#1A1A1A] hover:text-white transition-colors font-mono">
        <!-- Warning Icon -->
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        ISSUES
      </a>
      <a routerLink="/monitoring" routerLinkActive="bg-black text-white"
        class="flex items-center px-4 py-3 text-sm font-bold text-gray-400 rounded-lg hover:bg-[#1A1A1A] hover:text-white transition-colors font-mono">
        <!-- Wave/Chart Icon -->
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4 4" />
        </svg>
        MONITOR
      </a>
      <a routerLink="/tutorial" routerLinkActive="bg-black text-white"
        class="flex items-center px-4 py-3 text-sm font-bold text-gray-400 rounded-lg hover:bg-[#1A1A1A] hover:text-white transition-colors font-mono">
        <!-- Question Icon -->
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        TUTORIAL
      </a>
    </nav>

    <div footer class="flex flex-col items-center gap-4 p-2">
      <app-logout-main></app-logout-main>
    </div>
  </app-sidebar>

  <!-- Main Content Area: offset by sidebar width on desktop -->
  <div class="xl:ml-[280px] flex flex-col min-h-screen">
    <app-navbar [isMobileOpen]="isSidebarOpen()" (toggleSidebar)="toggleSidebar()" />
    <main class="flex-1 p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
