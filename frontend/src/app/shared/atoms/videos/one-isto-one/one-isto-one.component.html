<div class="aspect-square overflow-hidden rounded-lg">
  @if (safeSrc()) {
  <iframe
    [src]="safeSrc()"
    [title]="title()"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen
    class="w-full h-full"
  ></iframe>
  }
</div>
