<app-card [title]="'Source Social Report'" [subtitle]="'TWEET'" [bgClass]="'bg-white'" [badgeColor]="'#1DA1F2'" [badgeRotate]="'rotate-[-6deg]'" [badgeIcon]="faXTwitter">

  <!-- Twitter / X Icon -->
  <div icon
    class="w-12 h-12 border-4 border-black flex items-center justify-center bg-[#1DA1F2] shrink-0 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
      <path
        d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.992-14.646.962-.695 1.797-1.562 2.457-2.549z" />
    </svg>
  </div>

  @if (isRealTweet(tweetId()) && isBrowser && renderState() !== 'error') {
  <!-- Real Interactive Embed Widget -->
  <div class="border-4 border-black bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] overflow-hidden">
    <div #tweetContainer class="twitter-tweet-container flex items-center justify-center" style="min-height: 260px;">
      @if (renderState() !== 'loaded') {
      <div class="font-mono text-[10px] font-black uppercase tracking-wider text-gray-400">
        Loading Tweet...
      </div>
      }
      <div #tweetTarget class="w-full"></div>
    </div>
  </div>
  } @else {
  <!-- Unavailable Fallback: Premium Neubrutalist Style -->
  <div
    class="flex flex-col items-center justify-center min-h-[250px] relative group overflow-hidden">

    <!-- Main Visual Error Icon -->
    <div class="relative mb-6">
      <!-- Offset shadow layer -->
      <div class="absolute inset-0 bg-[#FF4444] border-4 border-black translate-x-2 translate-y-2"></div>
      <!-- Main content layer -->
      <div class="relative bg-white border-4 border-black p-5 flex items-center justify-center transition-transform hover:translate-x-0.5 hover:translate-y-0.5">
        <fa-icon [icon]="faTriangleExclamation" class="text-[#FF4444] text-4xl"></fa-icon>
      </div>
    </div>

    <!-- Text Content -->
    <div class="text-center space-y-3 relative z-10">
      <div class="bg-black text-white px-4 py-1.5 inline-block -rotate-1 shadow-[4px_4px_0px_0px_rgba(255,68,68,1)]">
        <h3 class="font-black font-mono text-sm uppercase tracking-tight">Tweet Unavailable</h3>
      </div>
      
      <div class="space-y-1">
        <p class="text-gray-500 font-mono text-[10px] uppercase leading-relaxed max-w-[220px] mx-auto font-bold">
          The requested content has been deleted or is currently inaccessible.
        </p>
        <p class="text-gray-400 font-mono text-[8px] uppercase tracking-widest">
          Ref: SEC_PROTOCOL_404_VOID
        </p>
      </div>
    </div>
  </div>
  }
</app-card>
