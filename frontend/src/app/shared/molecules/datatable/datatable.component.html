<div class="w-full bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-8">
  <!-- Header Section -->
  <div class="flex flex-col items-start mb-8">
    <h1 class="text-2xl font-black text-black font-mono uppercase tracking-tighter">{{ title() }}</h1>
    <p class="text-xs text-gray-500 font-mono mt-1 uppercase tracking-widest">{{ subtitle() }}</p>
  </div>

  <!-- Filters Slot -->
  <div class="w-full">
    <ng-content select="[filters]"></ng-content>
  </div>

  <!-- Table Container -->
  <div class="relative overflow-x-auto w-full">
    <table app-table class="w-full table-fixed">
      <thead app-table-header>
        <tr app-table-row [hoverable]="false">
          @for (col of columns(); track col.key) {
          <th app-table-cell [isHeader]="true" [class]="col.class">
            {{ col.label }}
          </th>
          }
        </tr>
      </thead>
      <tbody app-table-body>
        <ng-content select="[rows]"></ng-content>
      </tbody>
    </table>
  </div>

  <!-- Pagination Footer Section -->
  <app-table-pagination [pagination]="pagination()" [loading]="loading()" (pagePrev)="pagePrev.emit()"
    (pageNext)="pageNext.emit()">
  </app-table-pagination>
</div>
