@if (value()) {
<!-- KPI Metrics Card -->
<div
  class="bg-white border-2 border-black p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex flex-col justify-between h-full min-h-[120px] transition-all duration-200 hover:scale-[1.02]">
  <div class="flex items-center gap-3">
    <ng-content select="[icon]"></ng-content>
    <span class="text-xs font-bold text-gray-500 font-mono tracking-wider uppercase">{{ title() }}</span>
  </div>
  <div class="mt-4">
    <span class="text-5xl font-extrabold font-mono text-black">{{ value() }}</span>
  </div>
</div>
} @else {
<!-- Generic Neubrutalist Content Card -->
<div
  [class]="'relative border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 pt-12 transition-all duration-200 hover:scale-[1.01] h-full ' + bgClass()">
  <!-- Badge corner: auto-detected via #badge template ref in projected content -->
  @if (hasBadge() || badgeIcon()) {
  <app-number-box [color]="badgeColor()" [rotationClass]="badgeRotate()">
    @if (badgeIcon()) {
    <fa-icon [icon]="badgeIcon()" class="text-white text-lg"></fa-icon>
    } @else {
    <ng-content select="[badge]"></ng-content>
    }
  </app-number-box>
  }

  <!-- Header: Icon & Titles -->
  <div class="flex items-start gap-4 mb-6">
    <ng-content select="[icon]"></ng-content>
    <div>
      @if (subtitle()) {
      <span class="text-[9px] font-black text-gray-500 font-mono tracking-widest uppercase block mb-1">
        {{ subtitle() }}
      </span>
      }
      <h2 class="text-lg font-black text-black font-mono uppercase tracking-tight">
        {{ title() }}
      </h2>
    </div>
  </div>

  <!-- Body Content -->
  <div class="space-y-4">
    <ng-content></ng-content>
  </div>
</div>
}
