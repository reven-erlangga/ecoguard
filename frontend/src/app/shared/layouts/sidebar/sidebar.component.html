<!-- Mobile backdrop -->
@if (isOpen()) {
<div class="fixed inset-0 z-40 bg-gray-900/50 xl:hidden transition-opacity" (click)="close()" aria-hidden="true"></div>
}

<!-- Sidebar -->
<aside [class.translate-x-0]="isOpen()" [class.-translate-x-full]="!isOpen()"
  class="fixed inset-y-0 left-0 z-50 flex flex-col w-[280px] bg-[#121212] text-white transition-transform duration-300 ease-in-out xl:translate-x-0">
  <div class="flex items-center justify-between px-6 py-5 border-b border-[#222222]">
    <!-- Brand / Logo Slot -->
    <ng-content select="[brand]"></ng-content>
  </div>

  <div class="flex-1 overflow-y-auto px-4 py-4 space-y-1 custom-scrollbar">
    <!-- Navigation Links Slot -->
    <ng-content></ng-content>
  </div>

  <div class="px-6 py-4 border-t border-[#222222]">
    <!-- Footer Slot (e.g. user profile, logout) -->
    <ng-content select="[footer]"></ng-content>
  </div>
</aside>
