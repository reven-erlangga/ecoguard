<header class="bg-[#EAEAEA] border-b border-[#D4D4D4] px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-4">
    <!-- Mobile menu button -->
    <button (click)="handleToggle()"
      class="xl:hidden text-black p-2 rounded-lg hover:bg-gray-200 transition-colors focus:outline-none cursor-pointer"
      aria-label="Toggle sidebar">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    <app-status-display></app-status-display>
  </div>

  <div class="flex items-center gap-4">
    <app-system-state></app-system-state>
    <ng-content></ng-content>
  </div>
</header>
