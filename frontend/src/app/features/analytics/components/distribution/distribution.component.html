<app-card title="ISSUE DISTRIBUTION" subtitle="Segment Proportions">
  @if (data.length > 0) {
    <div class="space-y-2">
      <div
        class="flex w-full h-14 border-4 border-black bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] overflow-hidden"
      >
        @for (item of data; track item.category) {
          <div
            [class]="
              item.color +
              ' h-full border-r-2 last:border-r-0 border-black transition-all duration-700 ease-out flex items-center justify-center font-mono font-black text-black text-xs select-none'
            "
            [style.width.%]="item.value"
            [title]="item.category + ': ' + item.value + '%'"
          >
            {{ item.value }}%
          </div>
        }
      </div>
    </div>
    <div
      class="min-h-80 flex flex-col justify-center gap-8 px-4 py-6 border-4 border-black bg-gray-50 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mt-2"
    >
      <!-- Sector Breakdown Details -->
      <div class="grid grid-cols-3 gap-4">
        @for (item of data; track item.category) {
          <div
            class="border-3 border-black p-3 bg-white shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] flex flex-col gap-1 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"
          >
            <div class="flex items-center gap-2">
              <div
                class="w-3.5 h-3.5 border-2 border-black rounded-sm shadow-[1px_1px_0px_0px_rgba(0,0,0,1)]"
                [class]="item.color"
              ></div>
              <span class="text-[10px] font-mono font-black uppercase text-black tracking-tight">{{
                item.category
              }}</span>
            </div>
            <span class="text-lg font-black font-mono text-black leading-tight"
              >{{ item.value }}%</span
            >
          </div>
        }
      </div>
    </div>
  } @else if (loading) {
    <div
      class="min-h-80 bg-gray-50 border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-pulse flex items-center justify-center mt-2"
    >
      <span class="font-mono text-xs font-black text-black uppercase tracking-wider animate-bounce"
        >Analyzing Distribution...</span
      >
    </div>
  }
</app-card>
