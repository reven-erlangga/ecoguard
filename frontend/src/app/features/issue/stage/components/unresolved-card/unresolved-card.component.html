<app-card 
  title="UNRESOLVED TODAY"
  subtitle="OUTSTANDING ISSUES"
  bgClass="bg-rose-50"
>
  <!-- Rotating Neubrutalist Icon Box on top-left -->
  <div 
    class="absolute -top-5 -left-5 w-14 h-14 text-black flex items-center justify-center border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-10 rotate-[-8deg]"
    style="background-color: #EF4444;"
  >
    <svg class="w-7 h-7 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
  </div>

  <div class="mt-4 flex items-center gap-3">
    <span class="text-5xl font-black font-mono text-black">
      {{ stageFacade.unresolvedToday() }}
    </span>
    <span class="text-xs font-bold font-mono text-rose-700 bg-rose-100 px-2 py-0.5 border border-rose-600">
      UNRESOLVED
    </span>
  </div>
</app-card>
