<app-card 
  title="TOTAL PENDING"
  subtitle="ACTIVE INCIDENTS"
  bgClass="bg-amber-50"
>
  <!-- Rotating Neubrutalist Icon Box on top-left -->
  <div 
    class="absolute -top-5 -left-5 w-14 h-14 text-black flex items-center justify-center border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-10 rotate-[-6deg]"
    style="background-color: #FFC72C;"
  >
    <svg class="w-7 h-7 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
    </svg>
  </div>

  <div class="mt-4 flex items-center gap-3">
    <span class="text-5xl font-black font-mono text-black">
      {{ stageFacade.totalPending() }}
    </span>
    <span class="text-xs font-bold font-mono text-amber-700 bg-amber-100 px-2 py-0.5 border border-amber-600">
      ACTIVE
    </span>
  </div>
</app-card>
