<div class="space-y-6">
  @for (report of reports(); track report.id) {
    @if (isRealTweet(report.tweet_id)) {
      <!-- Real Twitter Widget Container with a Neubrutalist outline wrap -->
      <div class="border-3 border-black p-4 bg-white shadow-[5px_5px_0px_0px_rgba(0,0,0,1)]">
        <div class="twitter-tweet-container" style="min-height: 150px;">
          <div class="flex items-center justify-center min-h-[150px]">
            <div [attr.id]="'tweet-embed-' + report.id" [attr.data-tweet-id]="report.tweet_id" class="w-full"></div>
          </div>
        </div>
        
        <!-- Action link to internal ticket -->
        <div class="mt-4 pt-4 border-t border-dashed border-gray-300 flex justify-end">
          <a [routerLink]="['/issue', report.id]">
            <app-button 
              variant="outline"
              size="sm"
              className="!text-[10px] !px-3 !py-1.5"
            >
              🔍 VIEW TICKET DETAIL
            </app-button>
          </a>
        </div>
      </div>
    } @else {
      <!-- Neubrutalist Premium Fallback Card -->
      <div class="border-3 border-black p-4 bg-white shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] flex flex-col gap-4 transform transition-all duration-200 hover:-translate-x-1 hover:-translate-y-1 hover:shadow-[7px_7px_0px_0px_rgba(0,0,0,1)]">
        
        <div class="flex gap-4">
          <!-- Neubrutalist Kotak Avatar (48x48px) -->
          <div class="w-12 h-12 bg-gray-100 border-3 border-black flex items-center justify-center text-lg shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] shrink-0 select-none">
            ❌
          </div>

          <div class="flex-1 min-w-0">
            <!-- Card Header -->
            <div class="flex justify-between items-baseline gap-2">
              <span class="font-black text-black font-mono uppercase tracking-tighter text-sm">Tweet Status</span>
              <span class="text-[10px] text-red-600 font-mono font-black uppercase tracking-tight">UNAVAILABLE</span>
            </div>

            <!-- Report Text -->
            <p class="text-xs text-gray-700 font-mono mt-2 leading-relaxed">
              ⚠️ This Tweet is unavailable or has been deleted by its owner.
            </p>
          </div>
        </div>

        <!-- Action to view formal report in our system -->
        <div class="pt-4 border-t border-dashed border-gray-300 flex justify-between items-center">
          <span class="text-[9px] text-gray-500 font-mono">INTERNAL ID: {{ report.id }}</span>
          <a [routerLink]="['/issue', report.id]">
            <app-button 
              variant="primary"
              size="sm"
              className="!text-[10px] !px-3 !py-1.5"
            >
              🔍 VIEW TICKET DETAIL
            </app-button>
          </a>
        </div>

      </div>
    }
  }
</div>
