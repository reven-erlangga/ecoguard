@if (loadFacade.alert().show) {
<div class="fixed top-6 right-6 z-50 animate-fade-in-up">
  <div
    class="border-4 border-black p-4 font-mono font-black uppercase text-xs shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-between gap-4 transition-all"
    [class.bg-emerald-400]="loadFacade.alert().type === 'success'"
    [class.bg-red-400]="loadFacade.alert().type === 'error'" [class.bg-sky-400]="loadFacade.alert().type === 'info'">
    <span>{{ loadFacade.alert().message }}</span>
    <button (click)="loadFacade.clearAlert()"
      class="font-black hover:scale-110 active:scale-95 pl-2 border-l border-black">✕</button>
  </div>
</div>
}

<app-issue-table ngSkipHydration [issues]="loadFacade.issues()" [loading]="loadFacade.loading()"
  [pagination]="loadFacade.pagination()" [searchVal]="loadFacade.search()" [statusVal]="loadFacade.selectedStatus()"
  [categoryVal]="loadFacade.selectedCategory()" [categories]="loadFacade.categories()" (pagePrev)="handlePrevPage()"
  (pageNext)="handleNextPage()" (searchChange)="loadFacade.setSearch($event)"
  (statusChange)="loadFacade.setStatus($event)" (categoryChange)="loadFacade.setCategory($event)"
  (viewDetail)="handleViewDetail($event)" (processIssue)="handleProcessIssue($event)">
</app-issue-table>

<!-- Neubrutalist Interactive Dialog -->
<app-modal [isOpen]="updateFacade.form.showDialog()" (close)="handleCloseDialog()"
  className="max-w-md border-4 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] font-mono text-black rounded-none">
  <!-- Dialog Header -->
  <app-header title="Process Incident" [subtitle]="'INCIDENT_ID: ' + updateFacade.form.activeIssueId()" [border]="true"
    level="h2"></app-header>

  <!-- Form Body -->
  <div class="space-y-6">

    <!-- Status Selectors (Neubrutalist Tabs) -->
    <div>
      <label class="block text-xs font-black uppercase mb-2">Select Resolution Status</label>
      <div class="grid grid-cols-2 gap-3">
        <app-button variant="white" (btnClick)="handleStatusSelect('RESOLVED')"
          [className]="updateFacade.form.status() === 'RESOLVED' ? '!bg-emerald-400 w-full flex items-center justify-center gap-1.5' : 'w-full flex items-center justify-center gap-1.5'">
          <fa-icon [icon]="faCheck"></fa-icon> Solve
        </app-button>
        <app-button variant="white" (btnClick)="handleStatusSelect('UNRESOLVED')"
          [className]="updateFacade.form.status() === 'UNRESOLVED' ? '!bg-red-400 w-full flex items-center justify-center gap-1.5' : 'w-full flex items-center justify-center gap-1.5'">
          <fa-icon [icon]="faXmark"></fa-icon> Unsolve
        </app-button>
      </div>
    </div>

    <!-- Note Textarea -->
    <div>
      <label class="block text-xs font-black uppercase mb-2">Reason / Resolution Notes</label>
      <app-textarea [rows]="3" [value]="updateFacade.form.note()" (valueChange)="updateFacade.form.note.set($event)"
        placeholder="ENTER OFFICIAL RESOLUTION STATEMENT OR REJECTION REASON..."></app-textarea>
    </div>

    <!-- Evidence File Upload -->
    <div>
      <label class="block text-xs font-black uppercase mb-2">Evidence Image (Optional)</label>
      <app-upload accept="image/*" [value]="updateFacade.form.imageFile()" (valueChange)="updateFacade.form.imageFile.set($event)"></app-upload>
    </div>

  </div>

  <!-- Action Buttons -->
  <div class="flex justify-end gap-3 mt-8 pt-4 border-t-2 border-black">
    <app-button variant="white" (btnClick)="handleCloseDialog()">
      Cancel
    </app-button>
    <app-button
      variant="primary"
      (btnClick)="handleSubmitDialog()"
      [disabled]="!updateFacade.form.isValid()"
      [loading]="updateFacade.submitting()"
    >
      Submit
    </app-button>
  </div>
</app-modal>
