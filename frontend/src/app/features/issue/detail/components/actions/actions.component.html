<div class="flex gap-4 mt-4">
  <button (click)="onUpdateStatus('IN_PROGRESS')" 
          class="bg-brand-500 text-black font-bold py-2 px-4 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all">
    SET IN PROGRESS
  </button>
  <button (click)="onUpdateStatus('RESOLVED')" 
          class="bg-green-500 text-black font-bold py-2 px-4 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all">
    RESOLVE
  </button>
</div>
