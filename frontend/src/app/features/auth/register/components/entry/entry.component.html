<form (ngSubmit)="facade.onSubmit($event)" class="space-y-6 relative z-20">

  <!-- Full Name -->
  <div>
    <label class="block text-xs font-black uppercase mb-2">Full Name</label>
    <app-input
      [value]="form.name()"
      (valueChange)="form.name.set($event)"
      type="text"
      placeholder="ENTER FULL NAME..."
      class="w-full"
      [disabled]="facade.isLoading()">
    </app-input>
  </div>

  <!-- Email -->
  <div>
    <label class="block text-xs font-black uppercase mb-2">Email Address</label>
    <app-input
      [value]="form.email()"
      (valueChange)="form.email.set($event)"
      type="email"
      placeholder="ENTER EMAIL ADDRESS..."
      class="w-full"
      [disabled]="facade.isLoading()">
    </app-input>
  </div>

  <!-- Password + Strength Meter -->
  <div>
    <label class="block text-xs font-black uppercase mb-2">Password</label>
    <app-input
      [value]="form.password()"
      (valueChange)="form.password.set($event)"
      type="password"
      placeholder="ENTER SECURE PASSWORD..."
      class="w-full"
      [disabled]="facade.isLoading()">
    </app-input>

    @if (form.password()) {
      <div class="mt-2 space-y-1">
        <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-wider">
          <span>Strength: <span class="underline decoration-2">{{ form.passwordStrength().label }}</span></span>
          <span>Min 8 chars</span>
        </div>
        <!-- Neubrutalist Segmented Progress Bar -->
        <div class="flex h-3 border-2 border-black bg-white p-0.5 space-x-0.5">
          <div class="flex-1 transition-all duration-300"
            [class]="form.passwordStrength().score >= 1 ? form.passwordStrength().color : 'bg-transparent'"></div>
          <div class="flex-1 transition-all duration-300"
            [class]="form.passwordStrength().score >= 2 ? form.passwordStrength().color : 'bg-transparent'"></div>
          <div class="flex-1 transition-all duration-300"
            [class]="form.passwordStrength().score >= 3 ? form.passwordStrength().color : 'bg-transparent'"></div>
          <div class="flex-1 transition-all duration-300"
            [class]="form.passwordStrength().score >= 4 ? form.passwordStrength().color : 'bg-transparent'"></div>
        </div>
      </div>
    }
  </div>

  <!-- Confirm Password -->
  <div>
    <label class="block text-xs font-black uppercase mb-2">Confirm Password</label>
    <app-input
      [value]="form.confirmPassword()"
      (valueChange)="form.confirmPassword.set($event)"
      type="password"
      placeholder="CONFIRM SECURE PASSWORD..."
      class="w-full"
      [disabled]="facade.isLoading()">
    </app-input>

    @if (form.confirmPassword() && !form.passwordsMatch()) {
      <div class="mt-2 text-[10px] font-black text-red-600 uppercase tracking-wider">
        ⚠️ Passwords do not match
      </div>
    }
  </div>

  <!-- Submit -->
  <div class="pt-4">
    <app-button
      type="submit"
      [disabled]="!form.isValid() || facade.isLoading()"
      variant="primary"
      className="w-full justify-center py-4 font-black tracking-wider">
      @if (facade.isLoading()) { REGISTERING... } @else { CREATE ACCOUNT }
    </app-button>
  </div>

</form>
